<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Webmail - Standalone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            <span>Webmail</span>
        </div>
        
        <button class="compose-btn" onclick="openCompose()">+ Compose</button>
        
        <ul class="nav-links">
            <li class="nav-item active" onclick="loadEmails('inbox', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3h-4l-2-3H2"></path><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
                Inbox
            </li>
            <li class="nav-item" onclick="loadEmails('sent', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                Sent
            </li>
            <li class="nav-item" onclick="loadEmails('trash', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Trash
            </li>
            <li class="nav-item" onclick="openSettings()" style="margin-top: auto;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Settings
            </li>
        </ul>
        
        <button class="sync-btn" onclick="syncEmails()" id="syncBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            Sync HostGator
        </button>
    </div>

    <!-- Main Content -->
    <div class="main-content glass">
        <div class="header">
            <h2 id="currentFolder">Inbox</h2>
        </div>
        <div class="content-body">
            <div class="email-list" id="emailList">
                <!-- Emails injected here -->
            </div>
            <div class="email-viewer" id="emailViewer">
                <div style="text-align: center; color: var(--text-secondary); margin-top: 100px;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom: 20px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <p>Select an email to read</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Compose Modal -->
    <div class="modal-overlay" id="composeModal">
        <div class="modal glass">
            <h2>Compose Email</h2>
            <div class="form-group">
                <label>To:</label>
                <input type="email" class="form-control" id="composeTo" placeholder="recipient@example.com">
            </div>
            <div class="form-group">
                <label>Subject:</label>
                <input type="text" class="form-control" id="composeSubject" placeholder="Email Subject">
            </div>
            <div class="form-group">
                <label>Message (HTML Supported):</label>
                <textarea class="form-control" id="composeBody" placeholder="Write your message here..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('composeModal')">Cancel</button>
                <button class="btn btn-primary" onclick="sendEmail()" id="sendBtn">Send Email</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal glass">
            <h2>HostGator SMTP/IMAP Settings</h2>
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Email Address:</label>
                    <input type="email" class="form-control" id="set_email">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Password:</label>
                    <input type="password" class="form-control" id="set_password">
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 2;">
                    <label>IMAP Host:</label>
                    <input type="text" class="form-control" id="set_imap" placeholder="mail.yourdomain.com">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>IMAP Port:</label>
                    <input type="number" class="form-control" id="set_imapport" value="993">
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 2;">
                    <label>SMTP Host:</label>
                    <input type="text" class="form-control" id="set_smtp" placeholder="mail.yourdomain.com">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>SMTP Port:</label>
                    <input type="number" class="form-control" id="set_smtpport" value="465">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('settingsModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveSettings()" id="saveSettingsBtn">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        let currentEmails = [];
        let activeFolder = 'inbox';

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openCompose() { openModal('composeModal'); }
        
        async function openSettings() {
            const res = await fetch('/api/settings');
            const data = await res.json();
            if(data.email) {
                document.getElementById('set_email').value = data.email || '';
                document.getElementById('set_imap').value = data.imap_host || '';
                document.getElementById('set_imapport').value = data.imap_port || 993;
                document.getElementById('set_smtp').value = data.smtp_host || '';
                document.getElementById('set_smtpport').value = data.smtp_port || 465;
            }
            openModal('settingsModal');
        }

        async function saveSettings() {
            const btn = document.getElementById('saveSettingsBtn');
            btn.innerText = "Saving...";
            await fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('set_email').value,
                    password: document.getElementById('set_password').value,
                    imap_host: document.getElementById('set_imap').value,
                    imap_port: document.getElementById('set_imapport').value,
                    smtp_host: document.getElementById('set_smtp').value,
                    smtp_port: document.getElementById('set_smtpport').value,
                })
            });
            btn.innerText = "Save Settings";
            closeModal('settingsModal');
            alert('Settings saved!');
        }

        async function loadEmails(folder, element) {
            if(element) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
            }
            activeFolder = folder;
            document.getElementById('currentFolder').innerText = folder.charAt(0).toUpperCase() + folder.slice(1);
            document.getElementById('emailViewer').innerHTML = '<div style="text-align: center; margin-top: 50px;">Select an email</div>';
            
            const list = document.getElementById('emailList');
            list.innerHTML = '<div style="padding:20px; text-align:center;">Loading...</div>';
            
            const res = await fetch('/api/emails/' + folder);
            currentEmails = await res.json();
            
            list.innerHTML = '';
            if(currentEmails.length === 0) {
                list.innerHTML = '<div style="padding:20px; text-align:center; color:#94a3b8;">No emails here</div>';
                return;
            }

            currentEmails.forEach((email, index) => {
                const item = document.createElement('div');
                item.className = 'email-item';
                item.onclick = () => showEmail(index, item);
                
                const title = folder === 'sent' ? email.recipient : email.sender;
                
                item.innerHTML = `
                    <div class="email-sender">${title.replace(/<.*>/, '')}</div>
                    <div class="email-subject">${email.subject || '(No Subject)'}</div>
                `;
                list.appendChild(item);
            });
        }

        function showEmail(index, element) {
            document.querySelectorAll('.email-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            const email = currentEmails[index];
            const viewer = document.getElementById('emailViewer');
            
            let actionBtn = '';
            if(activeFolder === 'inbox' || activeFolder === 'sent') {
                actionBtn = `<button class="btn btn-secondary" style="color:#ef4444; border-color:#ef4444;" onclick="trashEmail(${email.id})">Move to Trash</button>`;
            } else if(activeFolder === 'trash') {
                actionBtn = `<button class="btn btn-secondary" style="color:#ef4444; border-color:#ef4444;" onclick="deleteEmail(${email.id})">Delete Permanently</button>`;
            }

            viewer.innerHTML = `
                <div class="viewer-header">
                    <h2 class="viewer-subject">${email.subject || '(No Subject)'}</h2>
                    <div class="viewer-meta">
                        <div>
                            <strong>From:</strong> ${email.sender.replace(/</g, '&lt;').replace(/>/g, '&gt;')}<br>
                            <strong>To:</strong> ${email.recipient.replace(/</g, '&lt;').replace(/>/g, '&gt;')}
                        </div>
                        <div>
                            ${email.date_received}<br><br>
                            ${actionBtn}
                        </div>
                    </div>
                </div>
                <div class="viewer-body">
                    ${email.body || '(No Content)'}
                </div>
            `;
        }

        async function trashEmail(id) {
            await fetch('/api/trash/' + id, { method: 'POST' });
            loadEmails(activeFolder);
        }

        async function deleteEmail(id) {
            if(confirm("Permanently delete this email from local storage?")) {
                await fetch('/api/delete/' + id, { method: 'DELETE' });
                loadEmails(activeFolder);
            }
        }

        async function sendEmail() {
            const btn = document.getElementById('sendBtn');
            btn.innerHTML = '<span class="loader"></span> Sending...';
            btn.disabled = true;

            const res = await fetch('/api/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    to: document.getElementById('composeTo').value,
                    subject: document.getElementById('composeSubject').value,
                    body: document.getElementById('composeBody').value
                })
            });

            btn.innerHTML = 'Send Email';
            btn.disabled = false;

            const data = await res.json();
            if(data.success) {
                closeModal('composeModal');
                document.getElementById('composeTo').value = '';
                document.getElementById('composeSubject').value = '';
                document.getElementById('composeBody').value = '';
                if(activeFolder === 'sent') loadEmails('sent');
                alert("Email sent successfully! It will not show in HostGator Sent folder.");
            } else {
                alert("Error sending: " + data.error);
            }
        }

        async function syncEmails() {
            const btn = document.getElementById('syncBtn');
            btn.innerHTML = '<span class="loader"></span> Syncing...';
            btn.disabled = true;

            const res = await fetch('/api/sync', { method: 'POST' });
            const data = await res.json();
            
            btn.innerHTML = 'Sync HostGator';
            btn.disabled = false;

            if(data.success) {
                alert(`Successfully fetched and deleted ${data.count} emails from HostGator.`);
                if(activeFolder === 'inbox') loadEmails('inbox');
            } else {
                alert("Error syncing: " + data.error);
            }
        }

        // Initialize
        loadEmails('inbox', document.querySelector('.nav-item'));
    </script>
</body>
</html>
